<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Fast Style ID Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        
        /* Compact Camera Box */
        #scanner-container { position: relative; width: 300px; height: 180px; margin: 10px auto; border: 4px solid #007bff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Focus Area - Iske andar ID laate hi scan hoga */
        .focus-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 50px; border: 2px solid #00ff00; border-radius: 8px; box-shadow: 0 0 0 500px rgba(0,0,0,0.5); pointer-events: none; }
        .focus-box::after { content: "ALIGN STYLE ID HERE"; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: #00ff00; font-size: 10px; font-weight: bold; width: 100%; }

        #status { font-size: 18px; font-weight: bold; margin: 15px; color: #007bff; height: 25px; }
        .product-card { background: white; padding: 15px; border-radius: 12px; max-width: 320px; margin: 10px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid #28a745; text-align: left; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .id-text { color: #666; font-size: 14px; background: #eee; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 5px;">⚡ **Flash Scanner**</h2>
    <p style="font-size: 14px; color: #555;">ID ko green box ke ekdum kareeb layein.</p>

    <div id="scanner-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="focus-box"></div>
    </div>

    <div id="status">Initializing AI... 🧠</div>

    <div id="results"></div>

    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        const beep = document.getElementById('beepSound');
        let worker = null;
        let isReady = false;
        let detectedIDs = new Set();

        // 1. Worker ko pehle hi load kar lena (Speed ke liye)
        async function initOCR() {
            status.innerText = "Loading AI Engine... ⏳";
            worker = await Tesseract.createWorker('eng');
            await worker.setParameters({
                tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
                tessedit_pageseg_mode: '7', // Treat image as a single text line (FASTEST)
            });
            isReady = true;
            status.innerText = "System Ready! 🟢";
            startAutoScan();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous" } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "❌ Camera Error!";
            }
        }

        // 2. Continuous Scanning Loop
        async function startAutoScan() {
            if (!isReady) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Focus Area ko crop karke scan karna (High Performance)
            canvas.width = 400;
            canvas.height = 100;

            const scanLoop = async () => {
                // Video se sirf box wala hissa capture karna
                ctx.drawImage(video, video.videoWidth * 0.2, video.videoHeight * 0.4, video.videoWidth * 0.6, video.videoHeight * 0.2, 0, 0, 400, 100);
                
                try {
                    const { data: { text } } = await worker.recognize(canvas);
                    const cleanText = text.trim();
                    
                    if (cleanText.length > 5) {
                        checkID(cleanText);
                    }
                } catch (e) { console.log(e); }
                
                requestAnimationFrame(scanLoop); // Next frame ke liye wait karega
            };

            scanLoop();
        }

        function checkID(scannedText) {
            const database = {
                "xQSQHWvr": "Horse-X Power Capsules 🐎",
                "Q59KRp25": "Large X Power Capsule 💊"
            };

            for (let id in database) {
                // 'includes' use kiya hai taaki agar aas paas ka thoda text bhi aaye toh detect ho jaye
                if (scannedText.includes(id) && !detectedIDs.has(id)) {
                    detectedIDs.add(id);
                    beep.play(); // Success Sound
                    showResult(database[id], id);
                    
                    status.innerHTML = "✅ SUCCESS!";
                    setTimeout(() => { status.innerHTML = "Searching... 🔍"; }, 1500);
                }
            }
        }

        function showResult(name, id) {
            const div = document.createElement('div');
            div.className = 'product-card';
            div.innerHTML = `<strong>${name}</strong><br><span class="id-text">Style ID: ${id}</span>`;
            results.prepend(div);
        }

        // Sab kuch start karo
        startCamera();
        initOCR();
    </script>
</body>
</html>
