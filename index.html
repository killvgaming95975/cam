<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho Manager Pro - Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body {
            background-color: #fce7f3;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scanner UI Enhancements */
        #video-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #f43397;
            background: #000;
        }
        .scan-guide {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 50px;
            border: 2px dashed #f43397;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4);
            z-index: 10;
            border-radius: 8px;
        }
        .scan-line {
            position: absolute;
            width: 100%; height: 2px;
            background: #f43397;
            box-shadow: 0 0 15px #f43397;
            animation: moveScan 2s infinite linear;
        }
        @keyframes moveScan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-pink-100 my-8 fade-in">
        
        <div class="bg-gradient-to-br from-[#ff65a3] to-[#f43397] p-8 text-center text-white relative overflow-hidden">
            <h1 class="text-3xl font-extrabold mb-2 tracking-wide flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                AI Style Scanner
            </h1>
            <p class="text-pink-100 text-sm font-medium opacity-90">Instant Style ID Recognition ⚡</p>
        </div>

        <div class="p-6">
            <div id="video-wrapper" class="mb-6 shadow-lg">
                <div class="scan-guide"><div class="scan-line"></div></div>
                <video id="video" class="w-full" playsinline></video>
            </div>

            <div id="status" class="text-center py-2 px-4 mb-4 rounded-full bg-pink-50 text-[#f43397] font-bold text-sm">
                Initializing AI Engine...
            </div>

            <div class="mt-4">
                <h3 class="text-gray-700 font-bold mb-3 flex items-center gap-2">
                    📦 Scanned Inventory:
                </h3>
                <ul id="itemList" class="space-y-3">
                    </ul>
            </div>
        </div>
    </div>

    <canvas id="procCanvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const itemList = document.getElementById('itemList');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d');
        const scannedIds = new Set();
        
        let worker;

        // IDs Database
        const styleDatabase = {
            "xQSQHWvr": "Horse-X Power Capsules",
            "Q59KRp25": "Large X Power Capsule"
        };

        // 1. Initialize Tesseract Worker (Faster than simple Tesseract.recognize)
        async function initWorker() {
            status.innerText = "Loading AI Core... ⏳";
            worker = await Tesseract.createWorker({
                logger: m => console.log(m.status)
            });
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            // Optimization: Only look for specific characters
            await worker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
            });
            status.innerText = "Ready! Place ID in the box.";
            startCamera();
        }

        // 2. Start Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                video.play();
                setInterval(captureFrame, 1000); // Scans every 1 second for speed
            } catch (err) {
                status.innerText = "Camera Error! Please use HTTPS.";
            }
        }

        // 3. Fast Image Processing & OCR
        async function captureFrame() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            // Crop image to only scan the "Scan Box" area for 3x speed
            const scale = video.videoWidth / video.clientWidth;
            canvas.width = 400; // Small size for faster OCR
            canvas.height = 100;
            
            // Draw only the center part of the video
            ctx.drawImage(video, 
                video.videoWidth * 0.1, video.videoHeight * 0.4, video.videoWidth * 0.8, video.videoHeight * 0.2, 
                0, 0, canvas.width, canvas.height
            );

            // Apply Grayscale & Contrast for higher accuracy
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                let avg = (data[i] + data[i+1] + data[i+2]) / 3;
                data[i] = data[i+1] = data[i+2] = avg > 128 ? 255 : 0; // Binarization
            }
            ctx.putImageData(imageData, 0, 0);

            const { data: { text } } = await worker.recognize(canvas);
            processText(text);
        }

        // 4. Match & Display
        function processText(rawText) {
            const cleanText = rawText.replace(/\s/g, ''); // Remove spaces
            console.log("AI Scanned:", cleanText);

            for (let id in styleDatabase) {
                if (cleanText.includes(id) && !scannedIds.has(id)) {
                    scannedIds.add(id);
                    addItemToList(styleDatabase[id], id);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Haptic feedback
                }
            }
        }

        function addItemToList(name, id) {
            const li = document.createElement('li');
            li.className = "flex items-center justify-between bg-green-50 border-l-4 border-green-500 p-4 rounded-xl shadow-sm fade-in";
            li.innerHTML = `
                <div>
                    <p class="text-xs text-green-600 font-bold uppercase tracking-wider">Detected</p>
                    <p class="text-gray-800 font-extrabold">${name}</p>
                </div>
                <span class="bg-green-500 text-white text-[10px] px-2 py-1 rounded-md font-mono">${id}</span>
            `;
            itemList.prepend(li); // Newest on top
            status.innerText = "Success! ID: " + id + " Added.";
            setTimeout(() => status.innerText = "Scanning active...", 3000);
        }

        initWorker();
    </script>
</body>
</html>
