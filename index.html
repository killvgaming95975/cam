<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Accuracy Style Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; }
        
        /* Compact UI */
        #scanner-box { position: relative; width: 320px; height: 160px; margin: 15px auto; border: 4px solid #007bff; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Focus Area Overlay */
        .overlay-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 40px; border: 2px solid #00ff00; border-radius: 5px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); pointer-events: none; }
        .overlay-box::before { content: "CENTER STYLE ID HERE"; position: absolute; top: -18px; left: 0; color: #00ff00; font-size: 10px; font-weight: bold; width: 100%; }

        #status { font-size: 16px; font-weight: bold; margin: 10px; color: #d9534f; min-height: 24px; }
        .product-card { background: #fff; padding: 12px; border-radius: 10px; max-width: 320px; margin: 10px auto; border-left: 6px solid #28a745; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1); animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .id-badge { background: #e9ecef; font-family: monospace; padding: 2px 5px; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

    <h2 style="color:#007bff; margin-bottom:5px;">⚡ **Flash Scan 2.0**</h2>
    <p style="font-size: 13px; color: #666;">ID ko box ke bilkul beech mein laakar **2-3 second** rokein.</p>

    <div id="scanner-box">
        <video id="video" autoplay playsinline></video>
        <div class="overlay-box"></div>
    </div>

    <div id="status">Starting AI Engine... ⏳</div>

    <div id="results"></div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        const beep = document.getElementById('beep');
        let worker = null;
        let isProcessing = false;
        let detectedSet = new Set();

        // 1. Initialize AI with Speed Optimizations
        async function init() {
            try {
                status.innerText = "Loading AI... 🧠";
                worker = await Tesseract.createWorker('eng');
                await worker.setParameters({
                    tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
                    tessedit_pageseg_mode: '7', // Fast line scanning
                });
                
                status.innerText = "Ready! Bring ID Close 🟢";
                startCamera();
            } catch (e) { status.innerText = "Error loading AI!"; }
        }

        // 2. Camera Setup
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", focusMode: "continuous" } 
            });
            video.srcObject = stream;
            requestAnimationFrame(tick);
        }

        // 3. The Scanning Loop (Every ~1 second)
        let lastScan = 0;
        function tick(time) {
            if (time - lastScan > 1000 && !isProcessing) {
                scanFrame();
                lastScan = time;
            }
            requestAnimationFrame(tick);
        }

        async function scanFrame() {
            isProcessing = true;
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 300;
            canvas.height = 80;

            // --- IMAGE PROCESSING (The Secret Sauce) ---
            // Sirf focus area ko crop karna
            ctx.drawImage(video, video.videoWidth * 0.2, video.videoHeight * 0.45, video.videoWidth * 0.6, video.videoHeight * 0.1, 0, 0, 300, 80);
            
            // Image ko Grayscale (B&W) karna taaki AI ko text saaf dikhe
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                let avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                let threshold = avg > 120 ? 255 : 0; // Black or White only
                data[i] = data[i+1] = data[i+2] = threshold;
            }
            ctx.putImageData(imageData, 0, 0);

            try {
                const { data: { text } } = await worker.recognize(canvas);
                const cleanText = text.replace(/[^a-zA-Z0-9]/g, "").trim();
                
                checkDatabase(cleanText);
            } catch (e) { console.log(e); }
            
            isProcessing = false;
        }

        function checkDatabase(text) {
            const items = {
                "xQSQHWvr": "Horse-X Power Capsules 🐎",
                "Q59KRp25": "Large X Power Capsule 💊"
            };

            for (let id in items) {
                if (text.includes(id) && !detectedSet.has(id)) {
                    detectedSet.add(id);
                    beep.play();
                    showProduct(items[id], id);
                    status.innerHTML = "✅ Found: " + id;
                    setTimeout(() => { status.innerHTML = "Searching... 🔍"; }, 2000);
                }
            }
        }

        function showProduct(name, id) {
            const div = document.createElement('div');
            div.className = 'product-card';
            div.innerHTML = `<strong>${name}</strong><br><span class="id-badge">ID: ${id}</span>`;
            results.prepend(div);
        }

        init();
    </script>
</body>
</html>
