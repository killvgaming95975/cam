<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style ID Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; border: 5px solid #333; border-radius: 10px; overflow: hidden; }
        video { width: 100%; display: block; }
        #scan-btn { background-color: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        #status { margin: 15px; font-weight: bold; color: #555; }
        #product-list { margin-top: 30px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        li { padding: 10px; border-bottom: 1px solid #ddd; list-style: none; font-size: 18px; color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🔍 **Style ID Scanner**</h1>
    <p>Camera ko text ke paas laiye aur **Scan** button dabaiye.</p>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <button id="scan-btn">📷 **Scan Style ID**</button>
    
    <div id="status">Status: Camera Ready ✅</div>

    <div id="product-list">
        <h3>📦 **Detected Products:**</h3>
        <ul id="list-items">
            </ul>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const scanBtn = document.getElementById('scan-btn');
        const status = document.getElementById('status');
        const listItems = document.getElementById('list-items');

        // 1. Camera Access Setup
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } // Rear camera use karega
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "❌ Camera access denied!";
                console.error(err);
            }
        }

        // 2. OCR Scanning Logic
        async function scanImage() {
            status.innerText = "🔄 Scanning... Please wait.";
            
            // Canvas par current frame capture karna
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            // Tesseract se text recognize karna
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            
            console.log("Detected Text:", text); // Debugging ke liye

            // 3. Logic: ID Check karna
            checkStyleID(text);
        }

        function checkStyleID(detectedText) {
            let found = false;

            // ID: xQSQHWvr detection
            if (detectedText.includes("xQSQHWvr")) {
                addItemToList("Horse-X Power Capsules 🐎");
                found = true;
            }

            // ID: Q59KRp25 detection
            if (detectedText.includes("Q59KRp25")) {
                addItemToList("Large X Power Capsule 💊");
                found = true;
            }

            if (found) {
                status.innerText = "✅ ID Detected & Added!";
            } else {
                status.innerText = "⚠️ No matching ID found. Try again.";
            }
        }

        function addItemToList(productName) {
            const li = document.createElement('li');
            li.innerText = productName;
            listItems.appendChild(li);
        }

        // Button click event
        scanBtn.addEventListener('click', scanImage);

        // Start camera on load
        setupCamera();
    </script>
</body>
</html>
