<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Style Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 15px; }
        
        /* Camera UI */
        #scanner-container { position: relative; width: 320px; height: 180px; margin: 10px auto; border: 4px solid #007bff; border-radius: 15px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Scanning Line Animation */
        .scan-line { position: absolute; width: 100%; height: 2px; background: #00ff00; top: 0; animation: move 2s linear infinite; box-shadow: 0 0 8px #00ff00; }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }

        .focus-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 45px; border: 2px solid #fff; border-radius: 5px; box-sizing: border-box; }

        #status { font-size: 14px; font-weight: bold; margin: 10px; color: #333; }
        #debug-text { font-size: 11px; color: #888; background: #eee; padding: 5px; border-radius: 5px; margin-bottom: 10px; min-height: 15px; }

        .product-card { background: white; padding: 12px; border-radius: 10px; max-width: 320px; margin: 8px auto; border-left: 6px solid #28a745; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: pop 0.3s; }
        @keyframes pop { from { transform: scale(0.8); } to { transform: scale(1); } }
        
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom:5px;">🚀 **Visual Brain Scanner**</h2>
    
    <div id="scanner-container">
        <video id="video" autoplay playsinline></video>
        <div class="focus-box"></div>
        <div class="scan-line"></div>
    </div>

    <div id="status">Wait... AI is waking up 😴</div>
    <div id="debug-text">AI is seeing: nothing yet</div>

    <button onclick="scanFrame()">Manual Scan (If Auto Fails)</button>

    <div id="results"></div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const debugText = document.getElementById('debug-text');
        const results = document.getElementById('results');
        const beep = document.getElementById('beep');
        let worker = null;
        let detectedSet = new Set();

        async function init() {
            status.innerText = "Loading AI Engine... ⏳";
            worker = await Tesseract.createWorker('eng');
            await worker.setParameters({
                tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
                tessedit_pageseg_mode: '7',
            });
            status.innerText = "Ready! Aim at Style ID 🎯";
            startCamera();
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", focusMode: "continuous" } 
            });
            video.srcObject = stream;
            setInterval(scanFrame, 2000); // Auto-scan every 2 seconds
        }

        async function scanFrame() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 100;

            // Focus area crop (Centered)
            ctx.drawImage(video, video.videoWidth*0.2, video.videoHeight*0.4, video.videoWidth*0.6, video.videoHeight*0.2, 0, 0, 400, 100);
            
            // Grayscale & High Contrast for better reading
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let v = (d[i] + d[i+1] + d[i+2]) / 3;
                d[i] = d[i+1] = d[i+2] = v < 128 ? 0 : 255; 
            }
            ctx.putImageData(imgData, 0, 0);

            try {
                const { data: { text } } = await worker.recognize(canvas);
                const raw = text.trim();
                debugText.innerText = "AI is seeing: " + raw; // Yeh aapko batayega ki AI kya dekh raha hai
                
                checkLogic(raw);
            } catch (e) { console.error(e); }
        }

        function checkLogic(scanned) {
            const data = {
                "xQSQHWvr": "Horse-X Power Capsules 🐎",
                "Q59KRp25": "Large X Power Capsule 💊"
            };

            for (let id in data) {
                // Fuzzy Match: Agar 80% ID match ho jaye toh maan lo wahi hai
                if (scanned.toLowerCase().includes(id.toLowerCase()) || isSimilar(scanned, id)) {
                    if (!detectedSet.has(id)) {
                        detectedSet.add(id);
                        beep.play();
                        addCard(data[id], id);
                        status.innerHTML = "✅ Found: " + id;
                    }
                }
            }
        }

        // Simple similarity check (for small OCR errors like O vs 0)
        function isSimilar(s1, s2) {
            if (s1.length < 5) return false;
            let matches = 0;
            for(let i=0; i<s2.length; i++) {
                if(s1.includes(s2[i])) matches++;
            }
            return (matches / s2.length) > 0.8;
        }

        function addCard(name, id) {
            const div = document.createElement('div');
            div.className = 'product-card';
            div.innerHTML = `<strong>${name}</strong><br><small>ID: ${id}</small>`;
            results.prepend(div);
        }

        init();
    </script>
</body>
</html>
